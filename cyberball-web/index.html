<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cyberball</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/cyberball.css" />
</head>
<body>

  <section id="screen-id-entry" class="screen hidden">
    <div class="panel">
      <h1>Teilnahme-ID</h1>
      <p>Bitte geben Sie Ihre Teilnahme-/Proband:innen-ID ein:</p>
      <input type="text" id="pid-input" placeholder="z.B. TEST001" />
      <button id="btn-pid-submit" class="btn-primary">Weiter</button>
    </div>
  </section>

  <section id="screen-welcome" class="screen hidden">
    <div class="panel">
      <pre id="welcome-text" class="welcome-text"></pre>
      <button id="btn-play" class="btn-primary">Play</button>
    </div>
  </section>

  <section id="screen-play" class="screen hidden">
    <div id="stats-box" class="stats-box hidden">
      <span id="lbl-throws-made"></span>
      <span id="lbl-throws-taken"></span>
      <span id="lbl-total-throws"></span>
    </div>
    <canvas id="game-canvas" width="600" height="500"></canvas>
  </section>

  <section id="screen-thankyou" class="screen hidden">
    <div class="panel">
      <h1>Vielen Dank für Ihre Teilnahme!</h1>
      <p id="thankyou-msg"></p>

      <div id="id-box" class="hidden">
        <label for="id-input">Bitte geben Sie Ihre Teilnahme-ID ein:</label>
        <input type="text" id="id-input" />
        <button id="btn-id-submit" class="btn-primary">Absenden</button>
      </div>

      <button id="btn-download" class="btn-primary">Ergebnisse herunterladen</button>
    </div>
  </section>

  <section id="screen-error" class="screen hidden">
    <div class="panel">
      <h1>Fehler</h1>
      <p id="error-msg"></p>
    </div>
  </section>

  <script type="module" src="js/app.js"></script>
</body>
</html>
